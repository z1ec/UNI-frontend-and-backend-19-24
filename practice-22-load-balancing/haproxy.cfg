# HAProxy — конфигурация балансировки нагрузки
# Расположение файла: /etc/haproxy/haproxy.cfg

global
    log /dev/log local0
    maxconn 4096
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  30s
    timeout server  30s

# ─── Frontend — принимает входящие HTTP-запросы ───────────────────────────────
frontend http_front
    bind *:80
    default_backend http_back

# ─── Backend — список серверов приложения ────────────────────────────────────
backend http_back
    balance roundrobin              # алгоритм Round Robin
    option  httpchk GET /health     # проверка доступности через /health
    http-check expect status 200

    server server1 127.0.0.1:3000 check inter 5s fall 2 rise 3
    server server2 127.0.0.1:3001 check inter 5s fall 2 rise 3
    server server3 127.0.0.1:3002 check inter 5s fall 2 rise 3 backup

# ─── Веб-интерфейс статистики HAProxy ────────────────────────────────────────
listen stats
    bind *:8080
    stats enable
    stats uri /haproxy-stats
    stats refresh 5s
    stats auth admin:admin123
